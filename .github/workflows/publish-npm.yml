name: Publish npm

on:
  release:
    types: [published]
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Versión a publicar (ej. 0.1.0)'
        required: true
        default: '0.1.0'

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org
          always-auth: true

      - run: pnpm install --frozen-lockfile

      - name: Sync version from tag
        run: |
          if [ -n "${{ github.event.release.tag_name }}" ]; then
            VERSION="${{ github.event.release.tag_name }}"
          elif [ -n "${{ github.ref_name }}" ] && [[ "${{ github.ref_name }}" == v* ]]; then
            VERSION="${{ github.ref_name }}"
          else
            VERSION="v${{ inputs.version }}"
          fi
          VERSION="${VERSION#v}"
          npm version "$VERSION" --no-git-tag-version --allow-same-version

      - run: pnpm build:lib

      - name: Verify npm token
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo "::error::El secret NPM_TOKEN no está configurado en Settings → Secrets → Actions"
            exit 1
          fi
          echo "NPM_TOKEN configurado (${#NODE_AUTH_TOKEN} caracteres)"
          npm whoami || {
            echo "::error::npm whoami falló. Revisa que el token tenga Packages: Read and write y bypass 2FA si aplica."
            exit 1
          }

      - name: Publish to npm
        run: npm publish --access public --ignore-scripts
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
